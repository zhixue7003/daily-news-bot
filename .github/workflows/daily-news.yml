name: 每日新闻推送

on:
  schedule:
    # 北京时间早上 8:00（UTC 时间 0:00）
    - cron: '0 0 * * *'
  # 允许手动触发测试
  workflow_dispatch:

jobs:
  push-news:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 运行新闻推送脚本
        env:
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
        run: python news_fetcher.py
